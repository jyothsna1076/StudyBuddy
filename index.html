<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudyBuddy Web Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
    
    <style>
        /* Modern Dark Theme Variables */
        :root {
            --bg-main: #121212;
            --bg-panel: #1e1e1e;
            --bg-card: #2d2d2d;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #333;
            --accent-green: #10b981;
            --accent-green-hover: #059669;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --accent-red: #ef4444;
            --accent-red-hover: #dc2626;
            --accent-purple: #8b5cf6;
            --accent-purple-hover: #7c3aed;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main);
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Custom Dark Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #666; }

        .pdf-section { 
            flex: 3; 
            border-right: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
        }

        .pdf-header { 
            padding: 15px 25px; 
            background: var(--bg-panel); 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            justify-content: flex-start; /* Moved button to the top left */
            align-items: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 10;
        }
        
        /* Premium File Upload Button */
        .custom-file-upload {
            display: inline-block;
            padding: 12px 24px;
            cursor: pointer;
            background: var(--accent-blue);
            color: white;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .custom-file-upload:hover { 
            background: var(--accent-blue-hover); 
            transform: translateY(-1px);
        }
        input[type="file"] { display: none; }
        
        #pdf-container { 
            flex-grow: 1; 
            width: 100%; 
            overflow-y: auto; 
            background: #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 30px; 
            padding-bottom: 50px;
            gap: 25px; 
        }
        #pdf-container canvas { 
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); 
            border-radius: 4px;
        }
        
        .sidebar { 
            flex: 1; 
            background: var(--bg-panel); 
            padding: 30px 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            box-shadow: -5px 0 15px rgba(0,0,0,0.2); 
            overflow-y: auto;
            z-index: 5;
        }
        
        /* NEW: Brand Header Layout */
        .brand-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .brand-logo {
            width: 42px; /* Perfect size for the sidebar */
            height: auto;
            border-radius: 8px; /* Rounds the corners slightly */
        }
        .brand-header h2 { margin: 0; color: #ffffff; font-size: 24px; letter-spacing: 0.5px;}
        
        button { 
            padding: 15px; 
            font-size: 16px; 
            font-weight: 600; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        button:hover { transform: translateY(-1px); }
        button:active { transform: translateY(1px); }

        .btn-start { background: var(--accent-green); color: white; }
        .btn-start:hover { background: var(--accent-green-hover); }
        .btn-state { background: #0ea5e9; color: white; display: none; }
        .btn-state:hover { background: #0284c7; }
        .btn-report { background: var(--accent-red); color: white; display: none; }
        .btn-report:hover { background: var(--accent-red-hover); }
        
        .btn-download { 
            background: var(--accent-purple); 
            color: white; 
            text-decoration: none; 
            text-align: center; 
            display: block; 
            padding: 15px; 
            font-size: 16px; 
            font-weight: bold; 
            border-radius: 8px; 
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        .btn-download:hover { background: var(--accent-purple-hover); transform: translateY(-1px); }

        .state-modal { display: none; position: absolute; top: 20px; right: 25vw; background: rgba(20, 20, 20, 0.95); color: white; padding: 20px 40px; border-radius: 12px; z-index: 1000; text-align: center; border: 1px solid #444; box-shadow: 0 10px 25px rgba(0,0,0,0.5); backdrop-filter: blur(5px);}
        .state-modal h2 { margin: 0 0 10px 0; color: #38bdf8; }
        .close-btn { position: absolute; top: 10px; right: 15px; color: #888; font-size: 24px; cursor: pointer; transition: 0.2s;}
        .close-btn:hover { color: #fff; }
        
        .settings-box { background: var(--bg-card); padding: 20px; border-radius: 10px; border: 1px solid var(--border-color); }
        .settings-box label { display: block; margin-bottom: 8px; color: #ddd; }
        .settings-box select { 
            width: 100%; 
            padding: 10px; 
            background: var(--bg-main);
            color: white;
            border-radius: 6px; 
            border: 1px solid #555;
            font-size: 14px;
            outline: none;
        }
        .settings-box select:focus { border-color: var(--accent-blue); }
        .instruction-text { font-size: 13px; color: var(--text-muted); margin-top: 10px; font-style: italic; line-height: 1.4;}
        
        #status-text { font-size: 15px; color: #bbb; text-align: center; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 6px;}

        /* Enhanced Report Output Styles applied via JS */
        .report-dashboard { background: var(--bg-card) !important; color: #fff; border: 1px solid var(--border-color); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .report-legend { background: var(--bg-main) !important; border: 1px solid #444 !important; }
        .report-legend span { filter: brightness(1.2); }

        #hidden-webcam { display: none; }
    </style>
</head>
<body>

    <div class="pdf-section">
        <div class="pdf-header">
            <label for="pdf-upload" class="custom-file-upload">
                📁 Select PDF Document
            </label>
            <input type="file" id="pdf-upload" accept="application/pdf">
        </div>
        <div id="pdf-container"></div> 
    </div>

    <div class="sidebar" id="sidebar-content">
        <div class="brand-header">
            <img src="logo.png" alt="StudyBuddy Logo" class="brand-logo" onerror="this.style.display='none'">
            <h2>StudyBuddy</h2>
        </div>
        
        <div class="settings-box" id="settings-panel">
            <label><strong>Tracking Mode</strong></label>
            <select id="tracking-mode" onchange="updateInstructions()">
                <option value="page"> General Page (Eye Tracking)</option>
                <option value="line"> Exact Line (Cursor Tracking)</option>
            </select>
            <p class="instruction-text" id="mode-instruction">We will track which general section of the page you are looking at.</p>
        </div>

        <p id="status-text">Upload a PDF to begin.</p>
        
        <button id="start-btn" class="btn-start" onclick="startStudying()"> Start Session</button>
        <button id="state-btn" class="btn-state" onclick="openStateMonitor()"> Live Monitor</button>
        <button id="report-btn" class="btn-report" onclick="fetchReport()">🛑 End Session & Get Report</button>
        
        <div id="report-output" style="display:none; margin-top:10px; padding:20px; border-radius:10px; transition: 0.3s;" class="report-dashboard"></div>
    </div>

    <div id="state-modal" class="state-modal">
        <span class="close-btn" onclick="closeStateMonitor()">&times;</span>
        <h2>Live Feed</h2>
        <p style="margin: 8px 0; font-size: 18px;">State: <strong id="modal-state" style="color:#fff;">...</strong></p>
        <p style="margin: 8px 0; font-size: 18px;">Struggle: <strong id="modal-struggle" style="color:#ef4444;">...</strong></p>
    </div>

    <video id="hidden-webcam" autoplay playsinline></video>
    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('hidden-webcam');
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');
        let studyInterval = null;
        let liveMonitorInterval = null; 
        
        let currentCursorY = 0;
        document.addEventListener('mousemove', (e) => { 
            const container = document.getElementById('pdf-container');
            const rect = container.getBoundingClientRect();
            currentCursorY = e.clientY - rect.top; 
        });

        function updateInstructions() {
            const mode = document.getElementById('tracking-mode').value;
            const text = document.getElementById('mode-instruction');
            if (mode === 'line') {
                text.innerHTML = "<strong style='color:#ef4444;'>Important:</strong> Please keep your mouse cursor hovering over the exact line you are reading.";
            } else {
                text.innerHTML = "We will track which general section of the page you are looking at.";
            }
        }

        document.getElementById('pdf-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file && file.type === "application/pdf") {
                
                document.getElementById('status-text').innerHTML = " Processing PDF...";

                const fileReader = new FileReader();
                fileReader.onload = function() {
                    const typedarray = new Uint8Array(this.result);
                    pdfjsLib.getDocument(typedarray).promise.then(pdf => {
                        const container = document.getElementById('pdf-container');
                        container.innerHTML = ''; 
                        
                        for(let i=1; i<=pdf.numPages; i++) {
                            const wrap = document.createElement('div');
                            wrap.id = `page-wrap-${i}`;
                            wrap.style.width = "100%";
                            wrap.style.display = "flex";
                            wrap.style.justifyContent = "center";
                            container.appendChild(wrap);
                        }
                        
                        for(let i=1; i<=pdf.numPages; i++) {
                            pdf.getPage(i).then(page => {
                                const viewport = page.getViewport({scale: 1.5}); 
                                const canvas = document.createElement('canvas');
                                const context = canvas.getContext('2d');
                                canvas.height = viewport.height;
                                canvas.width = viewport.width;
                                page.render({canvasContext: context, viewport: viewport});
                                document.getElementById(`page-wrap-${page.pageNumber}`).appendChild(canvas);
                            });
                        }
                    });
                };
                fileReader.readAsArrayBuffer(file);

                const formData = new FormData();
                formData.append('file', file);

                fetch('/upload_pdf', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if(data.status === "success") {
                        document.getElementById('status-text').innerHTML = " PDF Loaded & Synced. Ready when you are.";
                    }
                })
                .catch(err => console.error("Error uploading PDF:", err));
            }
        });

        function startStudying() {
            alert("CALIBRATION REQUIRED:\n\nWhen you click OK, please look directly at your webcam with a neutral, relaxed face for 2 seconds.");
            
            const selectedMode = document.getElementById('tracking-mode').value;

            fetch('/start_session', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tracking_mode: selectedMode })
            });

            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    video.srcObject = stream;
                    document.getElementById('status-text').innerHTML = "🟢 Session Active. Tracking running.";
                    document.getElementById('status-text').style.color = "#10b981";
                    
                    document.getElementById('start-btn').style.display = 'none';
                    document.getElementById('settings-panel').style.display = 'none';
                    document.getElementById('state-btn').style.display = 'block';
                    document.getElementById('report-btn').style.display = 'block';

                    studyInterval = setInterval(sendFrame, 500);
                })
                .catch(err => {
                    alert("Camera access is required.");
                });
        }

        function sendFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = canvas.toDataURL('image/jpeg', 0.5);

                const container = document.getElementById('pdf-container');
                const mode = document.getElementById('tracking-mode').value;
                
                let targetViewportY = mode === 'line' ? currentCursorY : (container.clientHeight / 2);
                let absoluteY = targetViewportY + container.scrollTop;

                let activePage = 1;
                let relativeYPct = 0.0;

                const wrappers = container.children;
                for (let i = 0; i < wrappers.length; i++) {
                    const wrap = wrappers[i];
                    const top = wrap.offsetTop;
                    const bottom = top + wrap.offsetHeight;
                    
                    if (absoluteY >= top && absoluteY <= bottom) {
                        activePage = i + 1;
                        if (wrap.offsetHeight > 0) {
                            relativeYPct = (absoluteY - top) / wrap.offsetHeight;
                        }
                        break;
                    }
                }

                fetch('/process_frame', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        image: imageData,
                        mode: mode,
                        active_page: activePage,
                        relative_y_pct: relativeYPct
                    })
                }).catch(err => console.error(err));
            }
        }

        function openStateMonitor() {
            document.getElementById('state-modal').style.display = 'block';
            updateLiveText();
            if (!liveMonitorInterval) liveMonitorInterval = setInterval(updateLiveText, 1000);
        }

        function updateLiveText() {
            fetch('/get_current_state')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('modal-state').innerText = data.state.toUpperCase();
                    document.getElementById('modal-struggle').innerText = data.struggle.toUpperCase();
                });
        }

        function closeStateMonitor() {
            document.getElementById('state-modal').style.display = 'none';
            clearInterval(liveMonitorInterval);
            liveMonitorInterval = null; 
        }

        function fetchReport() {
            clearInterval(studyInterval);
            if (liveMonitorInterval) clearInterval(liveMonitorInterval);
            
            document.getElementById('status-text').innerHTML = "⚙️ Compiling your custom report...";
            document.getElementById('status-text').style.color = "#bbb";
            document.getElementById('report-btn').style.display = 'none';
            document.getElementById('state-btn').style.display = 'none';
            
            fetch('/get_report')
                .then(response => response.json())
                .then(data => {
                    
                    const reportDiv = document.getElementById('report-output');
                    reportDiv.style.display = 'block';
                    document.getElementById('status-text').innerHTML = "✨ Session Complete!";
                    document.getElementById('status-text').style.color = "#3b82f6";
                    
                    let htmlContent = `<h3 style="margin-top:0; color:#fff; border-bottom: 1px solid #444; padding-bottom: 10px;">📊 Session Summary</h3>`;
                    
                    htmlContent += `<div style="display:flex; justify-content:space-between; margin-bottom: 15px;">`;
                    htmlContent += `<div><span style="color:#a0a0a0; font-size:13px;">Efficiency</span><br><strong style="font-size:20px; color:#10b981;">${data.efficiency}%</strong></div>`;
                    htmlContent += `<div><span style="color:#a0a0a0; font-size:13px;">Total Time</span><br><strong style="font-size:20px; color:#3b82f6;">${data.total_time_minutes}m</strong></div>`;
                    htmlContent += `</div>`;
                    
                    if (data.hardest_sections && data.hardest_sections.length > 0) {
                        htmlContent += `<p style="color:#ef4444; margin-bottom:5px;"><strong>⚠️ Hardest Sections:</strong></p><ul style="color:#ddd; margin-top:5px; padding-left: 20px;">`;
                        data.hardest_sections.forEach(section => {
                            htmlContent += `<li>Est. Page ${section.estimated_page} (${section.duration_seconds}s)</li>`;
                        });
                        htmlContent += `</ul>`;
                    } else {
                        htmlContent += `<p style="color:#10b981; background: rgba(16, 185, 129, 0.1); padding: 10px; border-radius: 6px;">✅ No major struggle areas detected!</p>`;
                    }

                    if (data.report_pdf_url) {
                        htmlContent += `<hr style="border:0; border-top:1px solid #444; margin: 20px 0;">`;
                        
                        htmlContent += `
                        <div class="report-legend" style="padding:15px; border-radius:8px; margin-bottom:20px; text-align:left;">
                            <strong style="color:#e0e0e0; font-size: 15px;">PDF Highlight Legend:</strong>
                            <ul style="margin: 10px 0 0 0; padding-left: 20px; font-size: 14px; color: #bbb; line-height: 1.6;">`;
                                
                        if (data.mode === 'line') {
                            htmlContent += `<li><span style="color: #ef4444; font-weight: bold;">Red Section:</span> Distracted Reading Lines</li>`;
                            htmlContent += `<li><span style="color: #10b981; font-weight: bold;">Green Section:</span> Top 5 Most Focused Lines</li>`;
                        } else {
                            htmlContent += `<li><span style="color: #ef4444; font-weight: bold;">Red Page:</span> High Distraction (> 30s)</li>`;
                            htmlContent += `<li><span style="color: #10b981; font-weight: bold;">Green Page:</span> Top 5 Most Focused Pages</li>`;
                            htmlContent += `<li><span style="color: #3b82f6; font-weight: bold;">Blue Border:</span> Most Revisited Page</li>`;
                        }

                        htmlContent += `
                            </ul>
                        </div>`;
                        
                        htmlContent += `<a href="${data.report_pdf_url}" target="_blank" class="btn-download">📥 Download Highlighted PDF</a>`;
                    }
                    
                    htmlContent += `<br><button onclick="window.location.reload()" style="width:100%; padding:12px; background:#444; color:white; border: 1px solid #555; margin-top: 10px;">Start New Session</button>`;

                    reportDiv.innerHTML = htmlContent;
                });
        }
    </script>
</body>
</html>
